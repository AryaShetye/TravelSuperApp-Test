# ============================================
# Travel Super App - Spring Boot Microservice
# ============================================

# Server
server.port=8080
spring.application.name=travel-booking-service

# PostgreSQL (same DB as Node.js backend)
spring.datasource.url=jdbc:postgresql://localhost:5432/travel_superapp
spring.datasource.username=travel_user
spring.datasource.password=travel_pass_2024
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# Security — disable default login for internal service
spring.security.user.name=service
spring.security.user.password=${SERVICE_PASSWORD:service_secret_2024}

# Logging
logging.level.com.travelsuperapp=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN

# SOAP
spring.ws.servlet.init.transformWsdlLocations=true
